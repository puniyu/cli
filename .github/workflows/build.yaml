name: Build Rust Package

on:
  workflow_call:

env:
  APP_NAME: puniyu

jobs:
  build_windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    steps:
      - name: 检出仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: 设置 rust
        uses: puniyu/setup-rust@a73bc9d219a9dd2aef471852daa4bc492ef1a24b # main
        with:
          save-cache: true
          target: ${{ matrix.platform.target }}
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        run: |
          cargo build --bin ${{ env.APP_NAME }} --release --target ${{ matrix.platform.target }}
        working-directory: puniyu_cli

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.target }}"
          path: |
            target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}*
            !target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}.pdb
            !target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}.d

  build_macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64

    steps:
      - name: 检出仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: 设置 rust
        uses: puniyu/setup-rust@a73bc9d219a9dd2aef471852daa4bc492ef1a24b # main
        with:
          save-cache: true
          target: ${{ matrix.platform.target }}
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        run: |
          cargo build --bin ${{ env.APP_NAME }} --release --target ${{ matrix.platform.target }}
        working-directory: puniyu_cli

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.target }}"
          path: |
            target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}*
            !target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}.pdb
            !target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}.d

  build_linux:
    runs-on: ${{ matrix.platform.runner }}
    container: ${{ matrix.platform.container }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64

    steps:
      - name: 检出仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'

      - name: 设置 rust
        uses: puniyu/setup-rust@a73bc9d219a9dd2aef471852daa4bc492ef1a24b # main
        with:
          save-cache: true
          target: ${{ matrix.platform.target }}
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        run: |
          cargo build --bin ${{ env.APP_NAME }} --release --target ${{ matrix.platform.target }}
        working-directory: puniyu_cli

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.target }}"
          path: |
            target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}*
            !target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}.pdb
            !target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}.d
